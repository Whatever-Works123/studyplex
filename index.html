<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studyplex - Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <div class="logo">✨ Studyplex</div>
    <div id="user-info" class="user-info hidden">
      <span id="user-email"></span>
      <button id="logout-btn" class="btn btn-secondary">Sign Out</button>
    </div>
  </header>

  <main class="container">
    
    <section id="auth-section" class="auth-box">
      <h2>Welcome to Studyplex</h2>
      <p>Sign in or create an account to access your personal dashboard.</p>
      
      <div class="form-group">
        <label for="auth-email">Email Address</label>
        <input type="email" id="auth-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="auth-password">Password</label>
        <input type="password" id="auth-password" placeholder="••••••••" required>
      </div>
      
      <div class="auth-buttons">
        <button id="login-btn" class="btn btn-primary">Sign In</button>
        <button id="signup-btn" class="btn btn-outline">Create Account</button>
      </div>
      <p id="auth-error" class="error-msg"></p>
    </section>

    <section id="dashboard-section" class="dashboard hidden">
      
      <nav class="tab-nav">
        <button class="tab-btn active" data-target="notes-view">📝 Notes</button>
        <button class="tab-btn" data-target="reminders-view">⏰ Reminders</button>
        <button class="tab-btn" data-target="schedule-view">📅 Schedule</button>
      </nav>

      <div id="notes-view" class="tab-content active">
        <div class="input-card">
          <h3>Create a New Note</h3>
          <input type="text" id="note-title" placeholder="Note Title...">
          <textarea id="note-body" rows="3" placeholder="Write your thoughts here..."></textarea>
          <button id="add-note-btn" class="btn btn-primary">Save Note</button>
        </div>
        <div id="notes-list" class="grid-container"></div>
      </div>

      <div id="reminders-view" class="tab-content">
        <div class="input-card">
          <h3>Add a Reminder</h3>
          <div class="row">
            <input type="text" id="reminder-text" placeholder="What do you need to remember?" style="flex: 2;">
            <input type="datetime-local" id="reminder-date" style="flex: 1;">
          </div>
          <button id="add-reminder-btn" class="btn btn-primary">Set Reminder</button>
        </div>
        <div id="reminders-list" class="list-container"></div>
      </div>

      <div id="schedule-view" class="tab-content">
        <div class="input-card">
          <h3>Schedule an Event</h3>
          <div class="row">
            <input type="text" id="schedule-title" placeholder="Event Name (e.g., Study Session)" style="flex: 2;">
            <input type="date" id="schedule-date" style="flex: 1;">
            <input type="time" id="schedule-time" style="flex: 1;">
          </div>
          <button id="add-schedule-btn" class="btn btn-primary">Add to Schedule</button>
        </div>
        <div id="schedule-list" class="list-container"></div>
      </div>

    </section>

  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
